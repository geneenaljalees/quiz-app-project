<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Quiz:</h1>
      <div class="quiz-info">
        <h3 class="ques-title">question</h3>
        <div class="options">
          <button class="op-1">option 1</button>
          <button class="op-2">option 2</button>
          <button class="op-3">option 3</button>
        </div>
        <div>
          <button id="submit-button">Submit answer</button>
        </div>
        <div>
          <button id="next-button">Next Question</button>
          <button id="prev-button">Previous Question</button>
        </div>
        <div class="quiz-result">
          <h3 class="result-title">Quiz result:</h3>
          <p class="result-text">You scored <span class="score">0</span></p>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
